<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan Toko — Pizza Azura</title>
    <link rel="stylesheet" href="css/admin.css?v=2.5">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="icon" href="images/logo.webp" type="image/webp">
    <style>
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        .settings-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }
        .settings-card h3 {
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--accent);
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .form-input {
            width: 100%;
            padding: 10px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 8px;
            font-family: inherit;
        }
        textarea.form-input {
            resize: vertical;
        }
    </style>
</head>
<body>

<header class="admin-header">
    <div class="admin-header-inner">
        <a href="/admin" class="admin-logo">
            <span class="logo-icon" style="display: flex; align-items: center;">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 4H4v2h16V4zm1 10v-2l-1-5H3L2 12v2c0 .55.45 1 1 1h1v6h10v-6h4v6h2v-6h1c.55 0 1-.45 1-1zM6 19v-4h6v4H6z"></path>
                </svg>
            </span>
            <span class="logo-text">Pizza Azura</span>
            <span class="admin-badge">ADMIN</span>
        </a>
        <div class="admin-nav-container">
            <div class="admin-actions">
                <button class="reset-btn" onclick="window.location.href='/admin'">🔙 Kembali ke Dashboard</button>
            </div>
        </div>
    </div>
</header>

<main class="admin-main">
    <div class="section-header" style="justify-content: space-between; align-items: center;">
        <h2 class="section-title" style="display:flex; align-items:center; gap:8px;"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg> Pengaturan Toko</h2>
        
    </div>
    
    <div id="loadingSettings" style="text-align:center; padding: 40px; color: var(--text-muted);">Memuat data pengaturan...</div>

    <div class="settings-grid" id="settingsContainer" style="display:none;">
        
        <!-- Slogan & Identitas -->
        <div class="settings-card">
            <h3><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg> Slogan & Banner</h3>
            <div class="form-group">
                <label>Slogan Footer</label>
                <textarea id="set_slogan" class="form-input" rows="3" placeholder="Masukkan slogan footer"></textarea>
            </div>
            <div class="form-group">
                <label>Link WhatsApp (Banner Atas)</label>
                <input type="text" id="set_wa_link" class="form-input" placeholder="https://wa.me/628...">
            </div>
        </div>

        <!-- Jam Operasional -->
        <div class="settings-card">
            <h3><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> Jam Operasional</h3>
            <div class="form-group">
                <label>Senin - Jumat</label>
                <input type="text" id="set_op_weekday" class="form-input" placeholder="contoh: 10.00 - 22.00">
            </div>
            <div class="form-group">
                <label>Sabtu - Minggu</label>
                <input type="text" id="set_op_weekend" class="form-input" placeholder="contoh: 11.00 - 23.00">
            </div>
            <div class="form-group">
                <label>Libur Nasional</label>
                <input type="text" id="set_op_holiday" class="form-input" placeholder="contoh: Buka">
            </div>
        </div>

        <!-- Kontak & Alamat -->
        <div class="settings-card">
            <h3><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg> Kontak & Alamat</h3>
            <div class="form-group">
                <label>Alamat (Footer)</label>
                <textarea id="set_contact_address" class="form-input" rows="2" placeholder="Alamat lengkap..."></textarea>
            </div>
            <div class="form-group">
                <label>Nomor Telepon</label>
                <input type="text" id="set_contact_phone" class="form-input" placeholder="+62 8...">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="text" id="set_contact_email" class="form-input" placeholder="hello@pizzaazura.com">
            </div>
        </div>

        <!-- Media Sosial -->
        <div class="settings-card">
            <h3><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg> Media Sosial</h3>
            <div class="form-group">
                <label>Link Facebook</label>
                <input type="text" id="set_fb_link" class="form-input" placeholder="https://facebook.com/...">
            </div>
            <div class="form-group">
                <label>Link Instagram</label>
                <input type="text" id="set_ig_link" class="form-input" placeholder="https://instagram.com/...">
            </div>
            <div class="form-group">
                <label>Link TikTok</label>
                <input type="text" id="set_tt_link" class="form-input" placeholder="https://vt.tiktok.com/...">
            </div>
        </div>

        <!-- Tentang Pizza Azura -->
        <div class="settings-card">
            <h3><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg> Tentang Pizza Azura</h3>
            <div class="form-group">
                <label>Deskripsi Tentang Kami (Gunakan baris baru untuk memisah paragraf)</label>
                <textarea id="set_about_content" class="form-input" rows="8" placeholder="Masukkan cerita/deskripsi Tentang Kami..."></textarea>
            </div>
        </div>

        <!-- WebGIS Lokasi Toko -->
        <div class="settings-card">
            <h3><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon><line x1="8" y1="2" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="22"></line></svg> WebGIS Lokasi Toko</h3>
            <div class="form-group">
                <label>Tentukan Lokasi Toko di Peta (Klik / Geser Pin)</label>
                <div id="settingsMap" style="width: 100%; height: 250px; border-radius: 8px; border: 1px solid var(--border); margin-top: 8px; margin-bottom: 15px; z-index: 1;"></div>
            </div>
            <div class="form-group">
                <label>Latitude (Garis Lintang)</label>
                <input type="text" id="set_store_lat" class="form-input" placeholder="contoh: -6.2146" readonly>
            </div>
            <div class="form-group">
                <label>Longitude (Garis Bujur)</label>
                <input type="text" id="set_store_lng" class="form-input" placeholder="contoh: 106.8215" readonly>
            </div>
            <div class="form-group">
                <label>Nama Toko (Map Popup)</label>
                <input type="text" id="set_store_name" class="form-input" placeholder="contoh: Pizza Azura Jakarta">
            </div>
            <div class="form-group">
                <label>Alamat Toko (Map Popup)</label>
                <input type="text" id="set_store_address" class="form-input" placeholder="contoh: Jl. Sudirman No. 123">
            </div>
            <div class="form-group">
                <label>Link Google Maps (Tombol Arah)</label>
                <input type="text" id="set_store_maps_link" class="form-input" placeholder="https://maps.app.goo.gl/...">
            </div>
        </div>

        <!-- WhatsApp Gateway API (Fonnte) -->
        <div class="settings-card">
            <h3><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg> Auto-Send WhatsApp Gateway (Fonnte)</h3>
            <div class="form-group">
                <label>Fonnte API Token</label>
                <input type="text" id="set_fonnte_token" class="form-input" placeholder="Masukkan Token API Fonnte Anda">
                <p style="font-size:11px;color:var(--text-muted);margin-top:4px;">Dapatkan gratis dari <a href="https://fonnte.com" target="_blank" style="color:var(--accent)">fonnte.com</a>. Kosongkan jika ingin menonaktifkan pengiriman otomatis.</p>
            </div>
            <div class="form-group">
                <label>Nomor WhatsApp Admin Utama (bisa diubah di sini)</label>
                <input type="text" id="set_admin_wa" class="form-input" placeholder="contoh: +62 851-9804-2502">
            </div>
        </div>
        
        <!-- Floating Action Button (FAB) for Settings -->
        <div style="position: fixed; bottom: 30px; right: 30px; z-index: 1000;">
            <button id="saveSettingsBtn" onclick="saveAllSettings()" style="padding:15px 30px;background:var(--accent);color:white;border:none;border-radius:50px;font-weight:700;font-family:inherit;cursor:pointer;font-size:16px;box-shadow: 0 10px 25px rgba(255,107,53,0.5); display:inline-flex; align-items:center; gap:8px; transition: transform 0.2s, background 0.3s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                Simpan Pengaturan
            </button>
        </div>
    </div>
</main>

<div class="toast" id="toast"></div>

<script src="/js/admin-settings-all.js?v=3.2"></script>
</body>
</html>
