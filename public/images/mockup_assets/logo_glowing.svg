<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Glowing background ring -->
  <circle cx="100" cy="115" r="95" fill="none" stroke="#ff6b35" stroke-width="4" stroke-dasharray="8 6" opacity="0.3" filter="url(#neonGlow)"/>
  
  <!-- Chef Hat -->
  <ellipse cx="100" cy="45" rx="35" ry="25" fill="#ffffff" filter="url(#neonGlow)"/>
  <path d="M 70 55 Q 65 68 70 80 L 130 80 Q 135 68 130 55 Z" fill="#ffffff" filter="url(#neonGlow)"/>
  <path d="M 82 52 Q 82 60 84 72" stroke="#333" stroke-width="2.5" fill="none"/>
  <path d="M 100 48 Q 100 60 100 72" stroke="#333" stroke-width="2.5" fill="none"/>
  <path d="M 118 52 Q 118 60 116 72" stroke="#333" stroke-width="2.5" fill="none"/>
  
  <!-- Azura text in green italic -->
  <text x="100" y="125" font-family="Georgia, serif" font-size="36" font-style="italic" fill="#addb41" text-anchor="middle" font-weight="bold" filter="url(#neonGlow)">azura</text>
  
  <!-- PIZZA text large -->
  <text x="100" y="168" font-family="'Lilita One', cursive, Arial Black, sans-serif" font-size="44" fill="#ffffff" text-anchor="middle" font-weight="900" letter-spacing="2" filter="url(#neonGlow)">PIZZA</text>
  
  <!-- Red banner -->
  <rect x="45" y="180" width="110" height="18" fill="#e53935" rx="2" filter="url(#neonGlow)"/>
  
  <!-- FRESHLY BAKED text -->
  <text x="100" y="193" font-family="Georgia, serif" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold" letter-spacing="1">FRESHLY BAKED</text>
  
  <!-- Est. 2020 text -->
  <text x="100" y="215" font-family="Arial, sans-serif" font-size="10" fill="#a0a0b0" text-anchor="middle">Est. 2020</text>
</svg>