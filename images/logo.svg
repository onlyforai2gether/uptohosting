<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Chef Hat -->
  <ellipse cx="100" cy="40" rx="45" ry="35" fill="#ffffff"/>
  <path d="M 60 55 Q 55 70 60 85 L 140 85 Q 145 70 140 55 Z" fill="#ffffff"/>
  
  <!-- Hat lines/ridges -->
  <path d="M 75 50 Q 75 60 78 75" stroke="#333" stroke-width="3" fill="none"/>
  <path d="M 100 45 Q 100 60 100 75" stroke="#333" stroke-width="3" fill="none"/>
  <path d="M 125 50 Q 125 60 122 75" stroke="#333" stroke-width="3" fill="none"/>
  
  <!-- Azura text in green italic -->
  <text x="100" y="130" font-family="Georgia, serif" font-size="40" font-style="italic" fill="#addb41" text-anchor="middle" font-weight="bold">azura</text>
  
  <!-- PIZZA text large -->
  <text x="100" y="175" font-family="Arial Black, sans-serif" font-size="48" fill="#ffffff" text-anchor="middle" font-weight="900" letter-spacing="2">PIZZA</text>
  
  <!-- Red banner -->
  <rect x="40" y="185" width="120" height="20" fill="#e53935" rx="2"/>
  
  <!-- FRESHLY BAKED text -->
  <text x="100" y="200" font-family="Georgia, serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold" letter-spacing="1">FRESHLY BAKED</text>
  
  <!-- Est. 2020 text -->
  <text x="100" y="225" font-family="Arial, sans-serif" font-size="11" fill="#cccccc" text-anchor="middle">Est. 2020</text>
</svg>